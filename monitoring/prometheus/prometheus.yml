global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: visual-search-engine
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          service: visual-search-api
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: qdrant
    static_configs:
      - targets: ["qdrant:6333"]
        labels:
          service: qdrant
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
